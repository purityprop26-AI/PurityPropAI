# ==============================================
# Render.com Blueprint — Auto-deploy Configuration
# ==============================================
# Deploy: https://render.com/deploy?repo=https://github.com/purityprop26-AI/PurityPropAI
# Docs: https://render.com/docs/blueprint-spec

services:
  - type: web
    name: purityprop-api
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    plan: free
    region: singapore  # Closest to India
    branch: main
    envVars:
      - key: DATABASE_URL
        sync: false  # Set manually in Render dashboard
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: JWT_SECRET_KEY
        sync: false
      - key: HF_API_TOKEN
        sync: false
      - key: SMTP_USER
        sync: false  # Gmail address for OTP emails
      - key: SMTP_PASS
        sync: false  # Gmail App Password
      - key: SMTP_FROM
        sync: false
      - key: REDIS_URL
        sync: false  # Upstash Redis free tier URL
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: APP_ENV
        value: production
      - key: DEBUG
        value: "false"
      - key: PYTHONPATH
        value: /app
    healthCheckPath: /
    autoDeploy: true
