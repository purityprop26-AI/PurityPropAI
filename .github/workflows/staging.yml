# ==============================================
# GitHub Actions — Staging Deployment Pipeline
# PurityProp AI — Preview before production
# ==============================================
# Triggers on push to 'staging' branch
# Runs full test suite + builds + deploys to Vercel preview
# Must pass before merging to main

name: Staging Pipeline

on:
  push:
    branches: [staging]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/intelligence-api

jobs:
  # ---- Lint ----
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff

      - name: Lint backend (strict)
        run: ruff check backend/ --select E,F,W --ignore E501

  # ---- Full Test Suite ----
  test:
    runs-on: ubuntu-latest
    needs: lint
    env:
      DATABASE_URL: "postgresql+asyncpg://test:test@localhost:5432/test"
      SUPABASE_URL: "https://test.supabase.co"
      SUPABASE_ANON_KEY: "test-key"
      GROQ_API_KEY: "test-key"
      JWT_SECRET_KEY: "staging-test-secret-key"
      PYTHONPATH: "backend"
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      - name: Run smoke tests (must ALL pass)
        run: pytest tests/test_smoke.py -v --tb=short -x

      - name: Run confidence engine tests
        run: |
          cd backend
          python -c "
          from app.services.confidence_engine import compute_confidence, compute_all_metrics
          score = compute_confidence(vector_similarity=0.92, data_age_months=6, comparable_count=15)
          assert 0 <= score <= 1
          m = compute_all_metrics('anna nagar', 8500, 12000)
          assert m['zone_tier'] == 'A'
          print('✅ Confidence engine: ALL PASS')
          "

  # ---- Frontend Build (Staging) ----
  frontend-staging:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install & Build Frontend
        env:
          VITE_API_URL: "https://puritypropai-9ri1.onrender.com"
          VITE_SUPABASE_URL: "https://rqqkhmbayxnsoyxhpfmk.supabase.co"
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY || 'placeholder' }}
          VITE_GOOGLE_CLIENT_ID: ${{ secrets.VITE_GOOGLE_CLIENT_ID || 'placeholder' }}
        run: |
          cd frontend
          npm ci
          npm run build

      - name: Verify build output
        run: |
          test -f frontend/dist/index.html || (echo "❌ Build failed" && exit 1)
          echo "✅ Frontend staging build verified"

  # ---- Docker Build (Staging — no push) ----
  docker-staging:
    runs-on: ubuntu-latest
    needs: [test, frontend-staging]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image (validation only — no push)
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:staging-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ---- Staging Gate Summary ----
  staging-gate:
    runs-on: ubuntu-latest
    needs: [lint, test, frontend-staging, docker-staging]
    steps:
      - name: Staging gate passed
        run: |
          echo "============================================"
          echo "✅ ALL STAGING CHECKS PASSED"
          echo "============================================"
          echo "Lint:     ✅"
          echo "Tests:    ✅"
          echo "Frontend: ✅"
          echo "Docker:   ✅"
          echo ""
          echo "Safe to merge to main for production deploy."
          echo "============================================"
